version: '3.8'

services:
  tachikoma:
    build: .
    ports:
      - "7860:7860"
    environment:
      - TACHIKOMA_LOG_LEVEL=INFO
      - TACHIKOMA_ENABLE_CACHING=true
      - TACHIKOMA_MAX_AGENTS=10
    volumes:
      - ./exports:/app/exports
      - ./logs:/app/logs
      - ./agent_states:/app/agent_states
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  redis_data:
